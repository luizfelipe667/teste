<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNES Style Adventure</title>
    <style>
        body { margin: 0; background: #222; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; image-rendering: pixelated; background: #5c94fc; width: 100vw; height: 100vh; }
        
        /* Controles Estilo Gameboy/SNES */
        #controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; pointer-events: none; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); pointer-events: auto; }
        .btn-dir { width: 50px; height: 50px; background: #333; border: 2px solid #555; color: white; display: flex; align-items: center; justify-content: center; user-select: none; }
        .action-btns { display: flex; align-items: center; pointer-events: auto; }
        .btn-a { width: 70px; height: 70px; background: #e74c3c; border: 4px solid #c0392b; border-radius: 50%; color: white; font-weight: bold; box-shadow: 0 5px 0 #922b21; user-select: none; }
        .btn-a:active { transform: translateY(4px); box-shadow: 0 1px 0 #922b21; }
    </style>
</head>
<body>

    <canvas id="game"></canvas>

    <div id="controls">
        <div class="d-pad">
            <div></div><div class="btn-dir" id="up">▲</div><div></div>
            <div class="btn-dir" id="left">◀</div><div></div><div class="btn-dir" id="right">▶</div>
            <div></div><div class="btn-dir" id="down">▼</div><div></div>
        </div>
        <div class="action-btns">
            <button class="btn-a" id="jump">PULAR</button>
        </div>
    </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Resolução interna de SNES (256x224 esticado)
const GAME_W = 256;
const GAME_H = 224;

let player = { x: 50, y: 150, w: 16, h: 24, vX: 0, vY: 0, grounded: false, frame: 0, anim: 0 };
let cameraX = 0;
let keys = { left: false, right: false };

// Simulação de Mundo (Chrono/Mario style)
const clouds = Array.from({length: 10}, () => ({x: Math.random()*1000, y: Math.random()*50}));

// Eventos Mobile
const bind = (id, k) => {
    const el = document.getElementById(id);
    el.ontouchstart = (e) => { e.preventDefault(); keys[k] = true; if(id==='jump' && player.grounded) player.vY = -4.5; };
    el.ontouchend = () => keys[k] = false;
};
bind('left', 'left'); bind('right', 'right'); bind('jump', '');

function update() {
    // Gravidade e Movimento
    player.vY += 0.2;
    if (keys.left) { player.vX = -1.5; player.frame = 1; }
    else if (keys.right) { player.vX = 1.5; player.frame = 2; }
    else { player.vX *= 0.8; player.frame = 0; }

    player.x += player.vX;
    player.y += player.vY;

    // Colisão simples com chão
    if (player.y > 180) {
        player.y = 180;
        player.vY = 0;
        player.grounded = true;
    } else {
        player.grounded = false;
    }

    // Câmera segue o jogador
    cameraX = player.x - GAME_W/2;
    player.anim += 0.1;

    draw();
    requestAnimationFrame(update);
}

function drawPlayer() {
    ctx.save();
    ctx.translate(player.x - cameraX, player.y);
    
    // Corpo (Estilo Chrono Trigger/Final Fantasy VI)
    ctx.fillStyle = "#3498db"; // Túnica
    ctx.fillRect(-8, -20, 16, 20);
    ctx.fillStyle = "#f3e5ab"; // Pele
    ctx.fillRect(-6, -28, 12, 12);
    ctx.fillStyle = "#e67e22"; // Cabelo espetado
    ctx.fillRect(-8, -32, 16, 8);
    
    // Animação de pernas ao andar
    let legOffset = Math.sin(player.anim * 10) * 3;
    ctx.fillStyle = "#2c3e50";
    if(Math.abs(player.vX) > 0.1) {
        ctx.fillRect(-6, 0, 4, legOffset > 0 ? -5 : -2);
        ctx.fillRect(2, 0, 4, legOffset > 0 ? -2 : -5);
    } else {
        ctx.fillRect(-6, 0, 4, -2); ctx.fillRect(2, 0, 4, -2);
    }
    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Upscale para tela cheia mantendo pixel art
    const scale = Math.min(window.innerWidth/GAME_W, window.innerHeight/GAME_H);
    ctx.setTransform(scale, 0, 0, scale, (window.innerWidth - GAME_W*scale)/2, 0);

    // Fundo Parallax (Céu)
    ctx.fillStyle = "#5c94fc";
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    
    // Nuvens
    ctx.fillStyle = "white";
    clouds.forEach(c => ctx.fillRect(c.x - cameraX*0.5, c.y, 30, 10));

    // Chão (Tileset)
    ctx.fillStyle = "#8b4513";
    ctx.fillRect(0 - cameraX, 200, 2000, 40);
    ctx.fillStyle = "#2ecc71";
    ctx.fillRect(0 - cameraX, 200, 2000
