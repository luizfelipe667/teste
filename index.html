<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Quest 16-Bit</title>
    <style>
        * { box-sizing: border-box; touch-action: none; }
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* Area do Jogo */
        #game-container { flex: 1; position: relative; background: #5c94fc; width: 100%; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; display: block; }

        /* Controles SNES */
        #controls { height: 180px; background: #222; display: flex; justify-content: space-around; align-items: center; padding: 10px; border-top: 4px solid #444; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 50px); }
        .btn { width: 50px; height: 50px; background: #444; color: white; border: 2px solid #666; display: flex; align-items: center; justify-content: center; font-weight: bold; user-select: none; }
        .btn-a { width: 80px; height: 80px; background: #f00; border-radius: 50%; border: 5px solid #a00; color: white; font-weight: bold; box-shadow: 0 4px 0 #600; }
        .btn:active, .btn-a:active { background: #888; transform: translateY(2px); }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="canvas"></canvas>
</div>

<div id="controls">
    <div class="d-pad">
        <div></div><div class="btn" id="up">▲</div><div></div>
        <div class="btn" id="left">◀</div><div></div><div class="btn" id="right">▶</div>
    </div>
    <button class="btn-a" id="jump">PULO</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Configuração de Resolução SNES
const vW = 256;
const vH = 224;

let player = { x: 50, y: 150, w: 14, h: 20, vX: 0, vY: 0, ground: false, anim: 0 };
let keys = { l: false, r: false };
let cameraX = 0;

// Ajuste de tela forçado
function resize() {
    canvas.width = vW;
    canvas.height = vH;
}
window.addEventListener('resize', resize);
resize();

// Controles Diretos
const setup = (id, k) => {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); if(k==='j'){ if(player.ground) player.vY=-5; } else { keys[k]=true; } });
    el.addEventListener('touchend', (e) => { e.preventDefault(); if(k!=='j') keys[k]=false; });
};
setup('left', 'l'); setup('right', 'r'); setup('jump', 'j');

function loop() {
    // Gravidade
    player.vY += 0.25;
    
    // Movimento
    if(keys.l) { player.vX = -2; player.anim += 0.2; }
    else if(keys.r) { player.vX = 2; player.anim += 0.2; }
    else { player.vX *= 0.8; }

    player.x += player.vX;
    player.y += player.vY;

    // Chão fixo
    if(player.y > 180) {
        player.y = 180;
        player.vY = 0;
        player.ground = true;
    } else {
        player.ground = false;
    }

    cameraX = player.x - vW/2;
    draw();
    requestAnimationFrame(loop);
}

function draw() {
    ctx.fillStyle = "#5c94fc"; // Céu Mario
    ctx.fillRect(0, 0, vW, vH);

    // Nuvens Parallax
    ctx.fillStyle = "#fff";
    for(let i=0; i<5; i++) ctx.fillRect((i*150) - cameraX*0.3, 40 + (i*10), 40, 15);

    // Chão Tileset
    ctx.fillStyle = "#8b4513"; // Terra
    ctx.fillRect(-cameraX, 200, 2000, 24);
    ctx.fillStyle = "#2ecc71"; // Grama
    ctx.fillRect(-cameraX, 200, 2000, 4);

    // Personagem (Boneco estilo Mario/Chrono)
    ctx.save();
    ctx.translate(player.x - cameraX, player.y);
    
    // Corpo
    ctx.fillStyle = "#e74c3c"; // Camisa vermelha
    ctx.fillRect(-7, -15, 14, 15);
    // Cabeça
    ctx.fillStyle = "#f3e5ab"; 
    ctx.fillRect(-5, -23, 10, 10);
    // Chapéu
    ctx.fillStyle = "#c0392b";
    ctx.fillRect(-7, -25, 14, 4);
    
    // Pernas animadas
    ctx.fillStyle = "#2c3e50";
    let walk = Math.sin(player.anim) * 4;
    ctx.fillRect(-6, 0, 4, -4 + (keys.l || keys.r ? walk : 0));
    ctx.fillRect(2, 0, 4, -4 + (keys.l || keys.r ? -walk : 0));
    
    ctx.restore();
}

loop(); // Inicia o jogo
</script>
</body>
</html>
