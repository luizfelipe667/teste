<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samurai Cinematic</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; filter: contrast(1.2) saturate(1.1); }
        
        #ui {
            position: absolute; top: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; justify-content: space-between;
        }
        .bars { display: flex; justify-content: space-around; padding: 20px; }
        .hp-outer { width: 40%; height: 15px; background: rgba(255,0,0,0.2); border: 1px solid #fff; position: relative; overflow: hidden; transform: skewX(-20deg); }
        .hp-inner { width: 100%; height: 100%; background: #e74c3c; transition: width 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        
        #controls {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: space-evenly; pointer-events: auto;
        }
        .btn {
            width: 80px; height: 80px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 24px; backdrop-filter: blur(5px);
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: rgba(255,255,255,0.2); transform: scale(0.9); }
        .strike { border: 2px solid #f1c40f; color: #f1c40f; width: 100px; height: 100px; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="bars">
            <div class="hp-outer"><div id="hp1" class="hp-inner"></div></div>
            <div class="hp-outer"><div id="hp2" class="hp-inner"></div></div>
        </div>
    </div>

    <canvas id="game"></canvas>

    <div id="controls">
        <div class="btn" id="btn-l">⬅️</div>
        <div class="btn strike" id="btn-a">⚔️</div>
        <div class="btn" id="btn-r">➡️</div>
    </div>
