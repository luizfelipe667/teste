<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atari Console Sim</title>
    <style>
        :root { --wood: #5d4037; --plastic: #1a1a1a; }
        body { margin: 0; background: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: monospace; }
        
        /* O Console Atari */
        #atari-body {
            width: 95vw; max-width: 500px; background: var(--plastic);
            border-top: 40px solid var(--wood); /* Faixa de madeira clássica */
            border-bottom: 20px solid var(--plastic);
            border-radius: 10px; padding: 20px; box-shadow: 0 20px 0 #000;
        }

        /* Tela da TV Antiga */
        #tv-screen {
            background: #000; border: 15px solid #333; border-radius: 20px;
            position: relative; overflow: hidden;
        }
        canvas { 
            width: 100%; height: auto; image-rendering: pixelated; 
            display: block; background: #000;
        }

        /* Painel de interruptores (Controles) */
        #switch-panel {
            display: flex; justify-content: space-around; margin-top: 20px;
        }
        .toggle {
            width: 40px; height: 60px; background: #555;
            border-radius: 5px; position: relative;
            box-shadow: inset 0 0 10px #000; cursor: pointer;
        }
        .toggle::after {
            content: ''; position: absolute; top: 10px; left: 15px;
            width: 10px; height: 30px; background: #aaa; border-radius: 5px;
        }
        .toggle:active::after { top: 20px; background: #fff; }

        .label { color: #ccc; font-size: 10px; text-align: center; margin-top: 5px; }
        
        /* Botão de Ação (Joystick) */
        #action-btn {
            width: 80px; height: 80px; background: #cc0000;
            border: 5px solid #000; border-radius: 10px; margin-top: 20px;
            box-shadow: 0 6px 0 #600;
        }
        #action-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #600; }
    </style>
</head>
<body>

    <div id="atari-body">
        <div id="tv-screen">
            <canvas id="game"></canvas>
        </div>
        
        <div id="switch-panel">
            <div><div class="toggle" id="btn-l"></div><div class="label">LEFT</div></div>
            <div><div class="toggle" id="btn-r"></div><div class="label">RIGHT</div></div>
            <div><div class="toggle" id="reset-btn"></div><div class="label">RESET</div></div>
        </div>
    </div>

    <button id="action-btn"></button>
    <div style="color: white; margin-top: 10px;">FIRE</div>
