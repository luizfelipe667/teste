<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Vercel Edition</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; background: linear-gradient(#1a1a2e, #16213e); }
        
        #hud {
            position: absolute; top: 10%; width: 100%;
            display: flex; justify-content: space-around;
            padding: 0 20px; pointer-events: none;
        }
        .health-container { width: 40%; height: 25px; background: #333; border: 2px solid #fff; }
        .health-bar { width: 100%; height: 100%; background: #00ff00; transition: width 0.3s; }

        #controls {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: space-evenly; padding: 0 10px;
        }
        .btn {
            width: 70px; height: 70px; background: rgba(255,255,255,0.1);
            border: 2px solid #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: bold; font-size: 20px;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: rgba(255,255,255,0.4); transform: scale(0.9); }
        .attack-btn { border-color: #ff4d4d; color: #ff4d4d; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="health-container"><div id="hp1" class="health-bar"></div></div>
        <div class="health-container"><div id="hp2" class="health-bar"></div></div>
    </div>

    <canvas id="game"></canvas>

    <div id="controls">
        <div class="btn" id="btn-left">←</div>
        <div class="btn" id="btn-right">→</div>
        <div class="btn attack-btn" id="btn-punch">👊</div>
    </div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const p1 = { x: 50, y: 0, w: 40, h: 80, hp: 100, color: '#4d94ff', speed: 5, attacking: false };
    const p2 = { x: canvas.width - 90, y: 0, w: 40, h: 80, hp: 100, color: '#ff4d4d', speed: 2, attacking: false };
    const ground = canvas.height - 100;

    let moveLeft = false;
    let moveRight = false;

    // Controles Touch
    const setupBtn = (id, startFn, endFn) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); startFn(); });
        el.addEventListener('touchend', (e) => { e.preventDefault(); endFn(); });
    };

    setupBtn('btn-left', () => moveLeft = true, () => moveLeft = false);
    setupBtn('btn-right', () => moveRight = true, () => moveRight = false);
    setupBtn('btn-punch', () => attack(p1, p2), () => {});

    function attack(attacker, target) {
        if (attacker.attacking) return;
        attacker.attacking = true;
        
        const hitRange = 60;
        const dist = Math.abs(attacker.x - target.x);
        
        if (dist < hitRange) {
            target.hp -= 10;
            updateHP();
        }
        
        setTimeout(() => attacker.attacking = false, 200);
    }

    function updateHP() {
        document.getElementById('hp1').style.width = p1.hp + '%';
        document.getElementById('hp2').style.width = p2.hp + '%';
        if (p2.hp <= 0) alert("Você venceu!");
    }

    function update() {
        // Player 1
        if (moveLeft && p1.x > 0) p1.x -= p1.speed;
        if (moveRight && p1.x < canvas.width - p1.w) p1.x += p1.speed;

        // IA Simples (Player 2)
        if (p2.x > p1.x + 50) p2.x -= p2.speed;
        else if (p2.x < p1.x - 50) p2.x += p2.speed;
        else if (Math.random() > 0.97) attack(p2, p1);

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Chão
        ctx.fillStyle = '#333';
        ctx.fillRect(0, ground, canvas.width, 100);

        // Personagens
        ctx.fillStyle = p1.color;
        ctx.fillRect(p1.x, ground - p1.h, p1.w, p1.h);
        if(p1.attacking) { ctx.fillStyle="#fff"; ctx.fillRect(p1.x+p1.w, ground-p1.h+20, 20, 10); }

        ctx.fillStyle = p2.color;
        ctx.fillRect(p2.x, ground - p2.h, p2.w, p2.h);
        if(p2.attacking) { ctx.fillStyle="#fff"; ctx.fillRect(p2.x-20, ground-p2.h+20, 20, 10); }
    }

    update();
</script>
</body>
</html>
